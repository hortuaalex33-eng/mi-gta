<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GTA PRO MAX MUNDO ABIERTO 😈</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }

/* UI */
#joystickBase {position:absolute; bottom:40px; left:40px; width:140px; height:140px; background:rgba(255,255,255,0.1); border-radius:50%;}
#joystick {position:absolute; width:70px; height:70px; background:cyan; border-radius:50%; left:35px; top:35px;}
#shootBtn {position:absolute; bottom:60px; right:40px; width:80px; height:80px; background:red; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;}
#resetBtn {position:absolute; top:20px; right:20px; background:black; color:white; padding:10px; border-radius:10px;}

#money,#hp,#wanted { position:absolute; left:20px; font-weight:bold; }
#money{top:20px;color:#0f0;}
#hp{top:50px;color:red;}
#wanted{top:80px;color:yellow;}

#minimap {
 position:absolute; top:20px; right:20px;
 width:120px; height:120px;
 background:#000; border:2px solid white;
}
</style>
</head>

<body>

<div id="joystickBase"><div id="joystick"></div></div>
<div id="shootBtn">FIRE</div>
<div id="resetBtn">RESET</div>

<div id="money"></div>
<div id="hp"></div>
<div id="wanted"></div>

<canvas id="game"></canvas>
<canvas id="minimap"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

const mini = document.getElementById("minimap");
const mtx = mini.getContext("2d");

let world={width:6000,height:6000};
let camera={x:0,y:0};

// SAVE
let money=+localStorage.getItem("money")||0;
let health=+localStorage.getItem("health")||100;
let wanted=+localStorage.getItem("wanted")||0;

// PLAYER
let player={x:3000,y:3000};

// NPCs
let npcs=[];
function spawnNPC(){
 npcs.push({x:Math.random()*world.width,y:Math.random()*world.height});
}
for(let i=0;i<30;i++) spawnNPC();

// POLICE
let police=[];
function spawnPolice(){
 police.push({x:player.x+Math.random()*200-100,y:player.y+Math.random()*200-100});
}

// BULLETS
let bullets=[];

// JOYSTICK
let joy=document.getElementById("joystick");
let base=document.getElementById("joystickBase");
let inputX=0,inputY=0;

base.addEventListener("touchmove",e=>{
 let t=e.touches[0],r=base.getBoundingClientRect();
 let x=t.clientX-r.left-70,y=t.clientY-r.top-70;
 let d=Math.hypot(x,y),max=50;
 if(d>max){x=(x/d)*max;y=(y/d)*max;}
 joy.style.left=(x+35)+"px";
 joy.style.top=(y+35)+"px";
 inputX=x/max; inputY=y/max;
});

base.addEventListener("touchend",()=>{
 inputX=0; inputY=0;
 joy.style.left="35px";
 joy.style.top="35px";
});

// SHOOT
document.getElementById("shootBtn").addEventListener("touchstart",()=>{
 bullets.push({
  x:player.x,
  y:player.y,
  vx:(inputX||1)*1000,
  vy:(inputY||0)*1000
 });
 wanted+=0.5;
});

// RESET
document.getElementById("resetBtn").onclick=()=>{
 if(confirm("Reset total?")){
  localStorage.clear();
  location.reload();
 }
};

// LOOP
let last=0;
function loop(t){
 let dt=(t-last)/1000;
 last=t;
 update(dt);
 draw();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// UPDATE
function update(dt){

 player.x+=inputX*300*dt;
 player.y+=inputY*300*dt;

 // NPCs
 npcs.forEach(n=>{
  let dx=player.x-n.x;
  let dy=player.y-n.y;
  let d=Math.hypot(dx,dy);
  if(d<300){
   n.x+=dx/d*80*dt;
   n.y+=dy/d*80*dt;
  }
 });

 // POLICE SPAWN
 if(wanted>1 && police.length<5){
  spawnPolice();
 }

 // POLICE AI
 police.forEach(p=>{
  let dx=player.x-p.x;
  let dy=player.y-p.y;
  let d=Math.hypot(dx,dy);
  p.x+=dx/d*200*dt;
  p.y+=dy/d*200*dt;

  if(d<40){
   health-=50*dt;
  }
 });

 // BULLETS
 bullets.forEach(b=>{
  b.x+=b.vx*dt;
  b.y+=b.vy*dt;
 });

 // HIT
 bullets.forEach((b,bi)=>{
  npcs.forEach((n,ni)=>{
   if(Math.hypot(n.x-b.x,n.y-b.y)<20){
    npcs.splice(ni,1);
    bullets.splice(bi,1);
    money+=30;
    wanted+=1;
    spawnNPC();
   }
  });
 });

 // WANTED decay
 wanted-=dt*0.2;
 if(wanted<0) wanted=0;

 // SAVE
 localStorage.setItem("money",money);
 localStorage.setItem("health",health);
 localStorage.setItem("wanted",wanted);

 // CAMERA
 camera.x+=((player.x-canvas.width/2)-camera.x)*0.1;
 camera.y+=((player.y-canvas.height/2)-camera.y)*0.1;

 // UI
 document.getElementById("money").innerText="$"+money;
 document.getElementById("hp").innerText="❤️"+Math.floor(health);
 document.getElementById("wanted").innerText="⭐"+wanted.toFixed(1);
}

// DRAW
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#222";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="cyan";
 ctx.fillRect(player.x-camera.x,player.y-camera.y,30,30);

 ctx.fillStyle="orange";
 npcs.forEach(n=>ctx.fillRect(n.x-camera.x,n.y-camera.y,20,20));

 ctx.fillStyle="blue";
 police.forEach(p=>ctx.fillRect(p.x-camera.x,p.y-camera.y,20,20));

 ctx.fillStyle="yellow";
 bullets.forEach(b=>ctx.fillRect(b.x-camera.x,b.y-camera.y,5,5));

 // MINIMAP
 mtx.fillStyle="black";
 mtx.fillRect(0,0,120,120);

 let scale=120/world.width;

 mtx.fillStyle="white";
 mtx.fillRect(player.x*scale,player.y*scale,4,4);

 mtx.fillStyle="red";
 npcs.forEach(n=>mtx.fillRect(n.x*scale,n.y*scale,2,2));

 mtx.fillStyle="blue";
 police.forEach(p=>mtx.fillRect(p.x*scale,p.y*scale,2,2));
}
</script>

</body>
</html>
